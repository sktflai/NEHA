<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEHAプリ</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* HEADER */
header {
    background: #E4007F;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
}

#menuButton {
    font-size: 20px;
}

/* SIDEBAR */
#sidebar {
    position: fixed;
    top: 0;
    left: -240px;
    width: 240px;
    height: 100%;
    background: #111;
    color: white;
    padding: 20px;
    transition: 0.3s;
    z-index: 1000;
}

#sidebar.open {
    left: 0;
}

#sidebar button {
    display: block;
    background: none;
    color: white;
    border: none;
    padding: 10px 0;
    text-align: left;
    width: 100%;
}

/* MAIN */
main {
    padding: 15px;
}

.page {
    display: none;
}

.page.active {
    display: block;
}

.item {
    padding: 10px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
    <button id="menuButton">☰</button>
    <h2>NEHAプリ</h2>
</header>

<!-- SIDEBAR -->
<div id="sidebar">
    <button onclick="showPage('today')">本日の作業</button>
    <button onclick="showPage('calendar')">カレンダー</button>
    <button onclick="showPage('settings')">設定</button>
</div>

<main>

    <!-- TODAY -->
    <section id="todayPage" class="page active">
        <h2>本日の作業</h2>
        <div id="todayContent"></div>
    </section>

    <!-- CALENDAR -->
    <section id="calendarPage" class="page">
        <h2>カレンダー</h2>
        <div id="calendarContent"></div>
    </section>

    <!-- SETTINGS -->
    <section id="settingsPage" class="page">
        <h2>設定</h2>

        <select id="productSelect">
            <option>つぶあん</option>
            <option>こしあん</option>
            <option>シナモン</option>
            <option>抹茶</option>
            <option>バナナ</option>
            <option>北海道クリーム</option>
            <option>塩バター</option>
            <option>チーズ</option>
            <option>カレー</option>
        </select>

        <input type="date" id="expiryInput">
        <button id="addBtn">追加</button>

        <hr>

        <div id="list"></div>
    </section>

</main>

<script>
console.log("NEHA FULL APP LOADED");

let data = JSON.parse(localStorage.getItem("neha_data") || "[]");

// =========================
// SAVE
// =========================
function save() {
    localStorage.setItem("neha_data", JSON.stringify(data));
}

// =========================
// SIDEBAR
// =========================
const menuButton = document.getElementById("menuButton");
const sidebar = document.getElementById("sidebar");

menuButton.addEventListener("click", (e) => {
    e.stopPropagation();
    sidebar.classList.toggle("open");
});

document.addEventListener("click", (e) => {
    if (!sidebar.contains(e.target) && e.target !== menuButton) {
        sidebar.classList.remove("open");
    }
});

// =========================
// PAGE SWITCH
// =========================
window.showPage = function(page) {

    document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
    });

    document.getElementById(page + "Page").classList.add("active");
};

// =========================
// ADD ITEM
// =========================
document.getElementById("addBtn").addEventListener("click", () => {

    const name = document.getElementById("productSelect").value;
    const expiry = document.getElementById("expiryInput").value;

    if (!expiry) {
        alert("期限を入力してください");
        return;
    }

    data.push({ name, expiry });
    save();

    renderAll();
});

// =========================
// RENDER ALL
// =========================
function renderAll() {
    renderList();
    renderToday();
    renderCalendar();
}

// =========================
// LIST
// =========================
function renderList() {

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <b>${item.name}</b><br>
            ${item.expiry}
        `;

        list.appendChild(div);
    });
}

// =========================
// TODAY
// =========================
function renderToday() {

    const container = document.getElementById("todayContent");
    container.innerHTML = "";

    const today = new Date().toISOString().split("T")[0];

    const items = data.filter(p => p.expiry === today);

    if (items.length === 0) {
        container.innerHTML = "本日の対象なし";
        return;
    }

    items.forEach(item => {

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `<b>${item.name}</b><br>${item.expiry}`;

        container.appendChild(div);
    });
}

// =========================
// CALENDAR
// =========================
function renderCalendar() {

    const container = document.getElementById("calendarContent");
    container.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <b>${item.expiry}</b><br>
            ${item.name}
        `;

        container.appendChild(div);
    });
}

// INIT
renderAll();
</script>

</body>
</html>
